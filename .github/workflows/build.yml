name: Build CesaFlow IDE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      vscode_tag:
        description: 'VS Code tag to build from'
        required: false
        default: '1.96.4'
      cesaflow_version:
        description: 'CesaFlow IDE version'
        required: false
        default: '0.1.0'

env:
  VSCODE_TAG: ${{ github.event.inputs.vscode_tag || '1.96.4' }}
  CESAFLOW_VERSION: ${{ github.event.inputs.cesaflow_version || github.ref_name || '0.1.0' }}
  NODE_VERSION: '20'

jobs:

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (x64 + arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install system deps
        run: |
          brew install python@3.11 pkg-config || true
          pip3 install setuptools || true

      - name: Clone VS Code ${{ env.VSCODE_TAG }}
        run: |
          git clone --depth 1 --branch ${{ env.VSCODE_TAG }} \
            https://github.com/microsoft/vscode.git vscode

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-mac
        with:
          path: vscode/node_modules
          key: macos14-vscode-${{ env.VSCODE_TAG }}-node${{ env.NODE_VERSION }}-${{ hashFiles('vscode/package.json') }}

      - name: Apply branding
        run: |
          COMMIT=$(cd vscode && git rev-parse HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed "s/REPLACE_WITH_COMMIT/${COMMIT}/g; s/REPLACE_WITH_DATE/${DATE}/g" \
            product.json > vscode/product.json

      - name: Compile extension TypeScript
        working-directory: extension
        run: npm install && npm run compile

      - name: Copy built-in extension
        run: bash scripts/copy_extension.sh

      - name: Install dependencies
        if: steps.cache-mac.outputs.cache-hit != 'true'
        working-directory: vscode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install --legacy-peer-deps

      - name: Build macOS arm64
        working-directory: vscode
        run: npm run gulp vscode-darwin-arm64

      - name: Build macOS x64
        working-directory: vscode
        run: npm run gulp vscode-darwin-x64

      - name: Create DMGs
        run: |
          hdiutil create -volname "CesaFlow IDE" -srcfolder "VSCode-darwin-arm64" \
            -ov -format UDZO "cesaflow-ide-${{ env.CESAFLOW_VERSION }}-darwin-arm64.dmg"
          hdiutil create -volname "CesaFlow IDE" -srcfolder "VSCode-darwin-x64" \
            -ov -format UDZO "cesaflow-ide-${{ env.CESAFLOW_VERSION }}-darwin-x64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: '*.dmg'
          retention-days: 7

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential pkg-config libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev fakeroot rpm \
            python3-pip python3-setuptools
          pip3 install setuptools

      - name: Clone VS Code ${{ env.VSCODE_TAG }}
        run: |
          git clone --depth 1 --branch ${{ env.VSCODE_TAG }} \
            https://github.com/microsoft/vscode.git vscode

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-linux
        with:
          path: vscode/node_modules
          key: linux-vscode-${{ env.VSCODE_TAG }}-node${{ env.NODE_VERSION }}-${{ hashFiles('vscode/package.json') }}

      - name: Apply branding
        run: |
          COMMIT=$(cd vscode && git rev-parse HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed "s/REPLACE_WITH_COMMIT/${COMMIT}/g; s/REPLACE_WITH_DATE/${DATE}/g" \
            product.json > vscode/product.json

      - name: Compile extension TypeScript
        working-directory: extension
        run: npm install && npm run compile

      - name: Copy built-in extension
        run: bash scripts/copy_extension.sh

      - name: Install dependencies
        if: steps.cache-linux.outputs.cache-hit != 'true'
        working-directory: vscode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install --legacy-peer-deps

      - name: Build Linux x64
        working-directory: vscode
        run: npm run gulp vscode-linux-x64

      - name: Build .deb and .rpm
        working-directory: vscode
        run: |
          npm run gulp vscode-linux-x64-build-deb || true
          npm run gulp vscode-linux-x64-build-rpm || true

      - name: Create tar.gz
        run: |
          tar -czf "cesaflow-ide-${{ env.CESAFLOW_VERSION }}-linux-x64.tar.gz" VSCode-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            *.tar.gz
            vscode/.build/linux/deb/**/*.deb
            vscode/.build/linux/rpm/**/*.rpm
          retention-days: 7

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clone VS Code ${{ env.VSCODE_TAG }}
        shell: bash
        run: |
          git clone --depth 1 --branch ${{ env.VSCODE_TAG }} \
            https://github.com/microsoft/vscode.git vscode

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-win
        with:
          path: vscode/node_modules
          key: windows-vscode-${{ env.VSCODE_TAG }}-node${{ env.NODE_VERSION }}-${{ hashFiles('vscode/package.json') }}

      - name: Apply branding
        shell: bash
        run: |
          COMMIT=$(cd vscode && git rev-parse HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed "s/REPLACE_WITH_COMMIT/${COMMIT}/g; s/REPLACE_WITH_DATE/${DATE}/g" \
            product.json > vscode/product.json

      - name: Compile extension TypeScript
        working-directory: extension
        run: npm install && npm run compile

      - name: Copy built-in extension
        shell: bash
        run: bash scripts/copy_extension.sh

      - name: Install dependencies
        if: steps.cache-win.outputs.cache-hit != 'true'
        working-directory: vscode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install --legacy-peer-deps

      - name: Build Windows x64
        working-directory: vscode
        run: npm run gulp vscode-win32-x64

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "VSCode-win32-x64\*" `
            -DestinationPath "cesaflow-ide-${{ env.CESAFLOW_VERSION }}-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: '*.zip'
          retention-days: 7

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: "CesaFlow IDE ${{ github.ref_name }}"
          body: |
            ## CesaFlow IDE ${{ github.ref_name }}

            AI-powered coding assistant built on VS Code ${{ env.VSCODE_TAG }}.

            **Planner → Backend → Frontend → QA — 4 agents, one command.**

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS Apple Silicon (M1/M2/M3) | `cesaflow-ide-*-darwin-arm64.dmg` |
            | macOS Intel | `cesaflow-ide-*-darwin-x64.dmg` |
            | Windows 10/11 x64 | `cesaflow-ide-*-windows-x64.zip` |
            | Linux x64 (.tar.gz) | `cesaflow-ide-*-linux-x64.tar.gz` |

            ### Setup
            1. Download for your platform
            2. Run CesaFlow IDE
            3. Get your API key from [cesaflow.ai](https://cesaflow.ai/dashboard/api-keys)
            4. Press `Ctrl+Shift+O` to start your first run
          files: |
            *.dmg
            *.zip
            *.tar.gz
            **/*.deb
            **/*.rpm
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
